<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bon Appetit</title>

    <link rel="stylesheet" href="style.css">
</head>
<body style="
    margin: 0;
    min-height: 100vh;
">

<div class="header-bar">
    <span id="loginStatus"></span>

    <div>
        <a href="top.html">ホーム</a>
        <a href="contact.html">お問い合わせ</a>
        <a href="#" id="loginLink" onclick="openLogin()">ログイン</a>
    </div>
</div>

    <!-- 背景 -->
    <div class="bg_pattern ZigZag_3D"></div>

    <!-- メインコンテンツ -->
    <div style="padding-top: 80px; padding-bottom: 80px;">
        <header>
            <h1 class="top-title">
    Bon Appetit
</h1>

			
			<h2 class="top-subtitle">
			ボナペティ（Bon appétit ）は、フランス語で「bon（良い）」と「appétit （食欲）」という意味の単語からなり、<br>
				直訳すると「良い食欲」。「たっぷり召し上がれ」「どうぞ召し上がれ」という意味で使われており、食事する相手に対する言葉である。<br>
        </h2>
				</header>
		

        <main>

            <!-- カルーセル -->
            <div class="carousel-wrap">

                <button onclick="prev()" style="
                    border:none;
                    background:none;
                    font-size:40px;
                    cursor:pointer;
                ">◀</button>

                <div id="cards" style="
                    display:flex;
                    gap:20px;
                ">
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                </div>

                <button onclick="next()" style="
                    border:none;
                    background:none;
                    font-size:40px;
                    cursor:pointer;
                ">▶</button>

            </div>

        </main>

    </div>

	<div class="asobi-link-wrap">

    <a href="asobi.html" class="asobi-link">
        遊び提案
    </a>

</div>
	
	<footer class="footer-bar">
	    © 2026 Bon Appetit 実行委員会
	</footer>



	
	<div id="loginModal" style="
	    display:none;
	    position:fixed;
	    top:50%;
	    left:50%;
	    transform:translate(-50%, -50%);
	    background:white;
	    padding:20px;
	    border-radius:10px;
	    box-shadow:0 0 10px rgba(0,0,0,0.3);
	    z-index:9999;
	">

	    <h3>ログイン</h3>

	    <input id="loginId" placeholder="ID"><br><br>
	    <input id="loginPw" type="password" placeholder="PW"><br><br>

	    <button onclick="login()">ログイン</button>
	    <button onclick="closeLogin()">閉じる</button>
		
	</div>

	<script src="data.js"></script>
	<script src="top.js"></script>
	<script src="login.js"></script>
	</body>
	
	</html>
